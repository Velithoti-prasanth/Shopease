<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — ShopEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="home.html">🛍 ShopEase</a>
  <div class="nav-actions">
    <button class="theme-toggle" id="theme-toggle">🌙</button>
    <a href="home.html" class="nav-btn" title="Shop">🏠</a>
    <a href="checkout.html" class="nav-btn" title="Checkout">💳</a>
  </div>
</nav>

<div class="orders-page">
  <h1 style="font-family:var(--font-head); font-size:2rem; font-weight:800; margin-bottom:1.5rem;">📦 My orders</h1>
  <div id="orders-list"></div>
</div>

<div id="toast-container"></div>
<script src="App.js"></script>
<script>
  function render() {
    const container = document.getElementById('orders-list');
    const orders = SE.state.orders;

    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📦</div>
          <h3>No orders yet</h3>
          <p>Your completed orders will appear here.</p>
          <a href="home.html" style="display:inline-block;margin-top:1rem;padding:.65rem 1.5rem;background:var(--accent);color:#fff;border-radius:50px;font-weight:600;text-decoration:none">Start shopping</a>
        </div>`;
      return;
    }

    container.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-header">
          <div>
            <div class="order-id">${o.id}</div>
            <div class="order-date">${o.date}</div>
          </div>
          <span class="order-status">${o.status}</span>
        </div>
        <div class="order-items">
          ${o.items.map(i => `
            <div class="order-item-row">
              <img src="${i.image}" alt="${i.title}">
              <span class="order-item-name">
                ${i.title.length > 45 ? i.title.slice(0, 45) + '…' : i.title}
                <span style="color:var(--text-3)">×${i.qty}</span>
              </span>
              <span class="order-item-price">$${(i.price * i.qty).toFixed(2)}</span>
            </div>
          `).join('')}
        </div>
        <div class="order-footer">
          <span style="color:var(--text-2);font-size:.85rem">${o.items.length} item${o.items.length !== 1 ? 's' : ''}</span>
          <span class="order-total">Total: $${o.total}</span>
        </div>
      </div>
    `).join('');
  }

  // ✅ Wait for DOMContentLoaded so app.js has fully loaded SE.state before rendering
  document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
