<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url(images/login-1.jpg);
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}


.card {
    background: transparent;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: white;
}

.form-control {
    border-radius: 10px;
    padding: 10px;
}


.btn-primary {
    width: 100%;
    border-radius: 10px;
}


@media (max-width: 576px) {
    .card {
        margin: 15px;
    }
}
</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-4 col-md-6 col-12">

<div class="card p-4">

<h3 class="text-center">Welcome Back 👋</h3>
<p class="text-center text-light">Login to your account</p>

<!-- Demo Credentials -->
<p class="text-black text-center small">
Demo: admin@gmail.com / 1234
</p>

<form onsubmit="handleLogin(event)">

<input type="email" id="email" class="form-control mb-3" placeholder="Enter email" required>

<div class="input-group mb-3">
    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
    
</div>

<button class="btn btn-primary">Login</button>

<p class="text-center mt-3">
Don’t have an account? 
<a href="register.html" class="text-white fw-bold">Register</a>
</p>

<div id="errorMsg" class="text-danger text-center mt-2"></div>

</form>

</div>
</div>
</div>
</div>

<script>
const demoUser = {
    email: "admin@gmail.com",
    password: "1234"
};

function handleLogin(e) {
    e.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let error = document.getElementById("errorMsg");

    error.textContent = "";

   
    if (email === demoUser.email && password === demoUser.password) {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "index.html";
        return;
    }

   
    let users = JSON.parse(localStorage.getItem("users")) || [];

    let valid = users.find(u => u.email === email && u.password === password);

    if (valid) {
        localStorage.setItem("isLoggedIn", "true");
        window.location.href = "index.html";
    } else {
        error.textContent = "Invalid email or password";
    }
}


function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
