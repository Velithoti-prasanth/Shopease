<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — ShopEase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .chat-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: calc(100vh - var(--nav-h));
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .bot-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ff8a65);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .bot-info h2 {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .bot-info p {
      font-size: .8rem;
      color: var(--text-2);
      margin: 0;
    }

    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
      margin-right: .3rem;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: .85rem;
      padding: .5rem 0;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: .65rem;
      align-items: flex-end;
      animation: msgIn .25s ease;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
      flex-shrink: 0;
    }

    .msg.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), #ff8a65); }
    .msg.user .msg-avatar { background: var(--surface-2); border: 1.5px solid var(--border); }

    .msg-bubble {
      max-width: 75%;
      padding: .75rem 1rem;
      border-radius: 18px;
      font-size: .92rem;
      line-height: 1.55;
    }

    .msg.bot .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Product cards inside chat */
    .chat-products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: .65rem;
      margin-top: .5rem;
    }

    .chat-product-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .65rem;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      text-align: center;
    }

    .chat-product-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .chat-product-card img {
      width: 60px; height: 60px;
      object-fit: contain;
      display: block;
      margin: 0 auto .4rem;
    }

    .chat-product-card .cp-title {
      font-size: .75rem;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .chat-product-card .cp-price {
      font-weight: 700;
      font-size: .82rem;
      color: var(--accent);
      margin-top: .25rem;
    }

    .chat-product-card .cp-add {
      margin-top: .35rem;
      padding: .2rem .5rem;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: .75rem 1rem;
    }

    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-3);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: none; }
      30% { transform: translateY(-6px); }
    }

    /* Quick chips */
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-top: .5rem;
    }

    .quick-chip {
      padding: .3rem .75rem;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: .8rem;
      cursor: pointer;
      transition: all .2s;
      font-family: var(--font-body);
    }

    .quick-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* Input area */
    .chat-input-area {
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .chat-input-row {
      display: flex;
      gap: .5rem;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: .75rem 1.1rem;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font-body);
      font-size: .92rem;
      outline: none;
      transition: border-color .2s;
    }

    .chat-input:focus { border-color: var(--accent); background: var(--surface); }

    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .12s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:active { transform: scale(.92); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">🛍 ShopEase</a>
  <div class="nav-actions">
    <button class="theme-toggle" id="theme-toggle">🌙</button>
    <a href="index.html" class="nav-btn" title="Shop">🏠</a>
    <button class="nav-btn" onclick="window.location='index.html'" title="Cart">
      🛒 <span class="badge-count cart-badge"></span>
    </button>
  </div>
</nav>

<div class="chat-page">

  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <h2>ShopEase AI</h2>
      <p><span class="online-dot"></span>Online · Powered by Claude</p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Ask me anything about products…" autocomplete="off">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<div id="toast-container"></div>
<script src="App.js"></script>
<script>
  let allProducts = [];
  let chatHistory = [];
  let isLoading = false;

  const QUICK_PROMPTS = [
    "Show me top rated products",
    "Find cheap items under $20",
    "Best men's clothing",
    "Recommend electronics",
    "Show women's jewellery",
  ];

  /* ── Load products ──────────────────────────── */
  async function init() {
    try {
      allProducts = await SE.fetchProducts();
    } catch(e) {
      console.warn('Could not load products:', e);
    }
    showWelcome();
  }

  /* ── Welcome message ────────────────────────── */
  function showWelcome() {
    const chips = QUICK_PROMPTS.map(q =>
      `<button class="quick-chip" onclick="sendQuick('${q}')">${q}</button>`
    ).join('');

    addBotMessage(`👋 Hi! I'm your ShopEase AI assistant.<br><br>
I can help you <strong>find products</strong>, compare prices, suggest gifts, and more. Just ask!
<div class="quick-chips">${chips}</div>`);
  }

  /* ── Add messages ───────────────────────────── */
  function addUserMessage(text) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-bubble">${text}</div>`;
    msgs.appendChild(el);
    scrollBottom();
  }

  function addBotMessage(html, products = []) {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg bot';

    let productHTML = '';
    if (products.length) {
      productHTML = `<div class="chat-products">${products.slice(0, 6).map(p => `
        <div class="chat-product-card" onclick="openProductPage(${p.id})">
          <img src="${p.image}" alt="${p.title}" loading="lazy">
          <div class="cp-title">${p.title}</div>
          <div class="cp-price">$${p.price.toFixed(2)}</div>
          <button class="cp-add" onclick="event.stopPropagation(); SE.cartAdd(${JSON.stringify(p).replace(/"/g,'&quot;')})">+ Cart</button>
        </div>`).join('')}</div>`;
    }

    el.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">${html}${productHTML}</div>`;
    msgs.appendChild(el);
    scrollBottom();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.id = 'typing';
    el.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">
        <div class="typing-indicator"><span></span><span></span><span></span></div>
      </div>`;
    msgs.appendChild(el);
    scrollBottom();
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function scrollBottom() {
    const msgs = document.getElementById('messages');
    setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 50);
  }

  /* ── Send ───────────────────────────────────── */
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || isLoading) return;
    input.value = '';
    await processMessage(text);
  }

  async function sendQuick(text) {
    if (isLoading) return;
    await processMessage(text);
  }

  async function processMessage(text) {
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    addUserMessage(text);
    chatHistory.push({ role: 'user', content: text });

    showTyping();

    // Find locally matching products for context
    const matched = findProducts(text);

    // Build system prompt with product catalogue summary
    const productSummary = allProducts.slice(0, 20).map(p =>
      `ID:${p.id} | ${p.title} | $${p.price} | ${p.category} | Rating:${p.rating.rate}`
    ).join('\n');

    const systemPrompt = `You are ShopEase AI, a friendly and helpful shopping assistant for an online clothing and electronics store.

You help users find products, compare options, suggest gifts, and answer shopping questions.

Here is the product catalogue (20 items from Fake Store API):
${productSummary}

When a user asks for products, respond with a helpful message AND output a JSON block at the END of your response in this exact format:
<products>[1,2,3]</products>
where the numbers are product IDs from the catalogue above that match what they want.

Keep responses concise, friendly, and focused on shopping. Use emojis sparingly. If they ask something unrelated to shopping, gently redirect them.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: chatHistory
        })
      });

      const data = await response.json();
      const rawText = data.content?.[0]?.text || "Sorry, I couldn't process that. Please try again!";

      // Extract product IDs from response
      const productMatch = rawText.match(/<products>\[([^\]]*)\]<\/products>/);
      let suggestedProducts = [];
      if (productMatch) {
        const ids = productMatch[1].split(',').map(s => parseInt(s.trim())).filter(Boolean);
        suggestedProducts = ids.map(id => allProducts.find(p => p.id === id)).filter(Boolean);
      }

      // Clean the display text
      const cleanText = rawText.replace(/<products>[\s\S]*?<\/products>/g, '').trim();

      removeTyping();
      chatHistory.push({ role: 'assistant', content: rawText });
      addBotMessage(cleanText.replace(/\n/g, '<br>'), suggestedProducts);

    } catch (err) {
      removeTyping();
      // Fallback: use local product matching
      const fallbackProducts = findProducts(text).slice(0, 4);
      const fallbackMsg = fallbackProducts.length
        ? `Here are some products that might match what you're looking for! 🛍`
        : `I'm having trouble connecting to AI right now. Try using the search bar on the <a href="index.html" style="color:var(--accent)">home page</a>!`;
      addBotMessage(fallbackMsg, fallbackProducts);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-input').focus();
  }

  /* ── Local fuzzy product finder ─────────────── */
  function findProducts(query) {
    const q = query.toLowerCase();
    const keywords = q.split(/\s+/);
    return allProducts.filter(p => {
      const text = `${p.title} ${p.category} ${p.description}`.toLowerCase();
      return keywords.some(k => k.length > 2 && text.includes(k));
    }).sort((a, b) => b.rating.rate - a.rating.rate);
  }

  function openProductPage(id) {
    localStorage.setItem('se_open_product', id);
    window.location.href = 'index.html';
  }

  /* ── Enter key ──────────────────────────────── */
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  init();
</script>
</body>
</html>
