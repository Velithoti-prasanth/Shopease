<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Search — ShopEase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .search-hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 1.5rem 1.5rem;
      text-align: center;
    }

    .search-hero h1 {
      font-family: var(--font-head);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text);
    }

    .search-hero h1 span { color: var(--accent); }
    .search-hero p { color: var(--text-2); margin-top: .4rem; font-size: .95rem; }

    /* ── Main search box ── */
    .smart-search-wrap {
      max-width: 680px;
      margin: 1.5rem auto 0;
      position: relative;
    }

    .smart-search-row {
      display: flex;
      gap: .5rem;
      align-items: center;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: .4rem .4rem .4rem 1.2rem;
      transition: border-color .2s, box-shadow .2s;
    }

    .smart-search-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,87,34,.1);
    }

    #smart-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      min-width: 0;
    }

    #smart-input::placeholder { color: var(--text-3); }

    .search-action-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all .2s;
      flex-shrink: 0;
    }

    .search-action-btn:hover { background: var(--border); color: var(--text); }

    .search-action-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .search-action-btn.primary:hover { background: var(--accent-hover); }

    /* Voice active state */
    .search-action-btn.listening {
      background: #ef4444 !important;
      color: #fff !important;
      animation: mic-pulse 1s infinite;
    }

    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }

    /* Image upload btn */
    .search-action-btn.img-btn { position: relative; }
    .search-action-btn.img-btn input[type=file] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    /* ── Suggestions dropdown ── */
    .suggestions-drop {
      position: absolute;
      top: calc(100% + .5rem);
      left: 0; right: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      z-index: 500;
      display: none;
    }

    .suggestions-drop.open { display: block; }

    .sug-section-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-3);
      padding: .75rem 1rem .35rem;
    }

    .sug-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 1rem;
      cursor: pointer;
      transition: background .15s;
      font-size: .92rem;
    }

    .sug-item:hover, .sug-item.focused { background: var(--surface-2); }
    .sug-item .sug-icon { font-size: .95rem; flex-shrink: 0; }
    .sug-item .sug-text { flex: 1; }
    .sug-item .sug-text em { color: var(--accent); font-style: normal; font-weight: 600; }
    .sug-item .sug-meta { font-size: .78rem; color: var(--text-3); }

    /* Typo suggestion */
    .typo-banner {
      background: var(--accent-light);
      border: 1.5px solid var(--accent);
      border-radius: 12px;
      padding: .65rem 1.1rem;
      font-size: .88rem;
      color: var(--text);
      margin-top: .75rem;
      display: none;
      align-items: center;
      gap: .5rem;
    }

    .typo-banner.show { display: flex; }
    .typo-banner a { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: underline; }

    /* ── Voice status ── */
    .voice-status {
      display: none;
      align-items: center;
      gap: .6rem;
      margin-top: .75rem;
      padding: .65rem 1.1rem;
      background: var(--surface);
      border: 1.5px solid #ef4444;
      border-radius: 12px;
      font-size: .88rem;
      color: var(--text);
    }

    .voice-status.show { display: flex; }

    .voice-wave {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .voice-wave span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: #ef4444;
      animation: wave 1s ease-in-out infinite;
    }

    .voice-wave span:nth-child(1) { height: 8px; }
    .voice-wave span:nth-child(2) { height: 16px; animation-delay: .1s; }
    .voice-wave span:nth-child(3) { height: 12px; animation-delay: .2s; }
    .voice-wave span:nth-child(4) { height: 20px; animation-delay: .3s; }
    .voice-wave span:nth-child(5) { height: 10px; animation-delay: .4s; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(.4); }
    }

    /* ── Image search preview ── */
    .img-preview-box {
      display: none;
      margin-top: .75rem;
      padding: .85rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      align-items: center;
      gap: 1rem;
    }

    .img-preview-box.show { display: flex; }

    .img-preview-box img {
      width: 64px; height: 64px;
      object-fit: cover;
      border-radius: 8px;
    }

    .img-preview-info { flex: 1; }
    .img-preview-info h4 { font-size: .9rem; font-weight: 600; }
    .img-preview-info p { font-size: .8rem; color: var(--text-2); margin-top: .15rem; }

    .img-search-btn {
      padding: .4rem 1rem;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Recent searches ── */
    .recent-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .recent-tag {
      padding: .28rem .7rem;
      border-radius: 50px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: .8rem;
      color: var(--text-2);
      cursor: pointer;
      transition: all .2s;
    }

    .recent-tag:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Results area ── */
    .search-results-area {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .results-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      font-size: .9rem;
      color: var(--text-2);
    }

    .results-meta strong { color: var(--text); }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: .5rem;
      margin: 1rem 0;
    }

    .mode-tab {
      padding: .4rem 1rem;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      font-family: var(--font-body);
    }

    .mode-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Category colours */
    .cat-badge {
      display: inline-block;
      padding: .15rem .55rem;
      border-radius: 50px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="home.html">🛍 ShopEase</a>
  <div class="nav-actions">
    <button class="theme-toggle" id="theme-toggle">🌙</button>
    <a href="chatbot.html" class="nav-btn" title="AI Chatbot">🤖</a>
    <a href="home.html" class="nav-btn" title="Shop">🏠</a>
    <button class="nav-btn" onclick="window.location='home.html'" title="Cart">
      🛒 <span class="badge-count cart-badge"></span>
    </button>
  </div>
</nav>

<!-- ── SEARCH HERO ───────────────────────── -->
<div class="search-hero">
  <h1>🔍 <span>Smart</span> Search</h1>
  <p>Voice search · Typo correction · AI suggestions · Image search</p>

  <div class="smart-search-wrap">
    <div class="smart-search-row">
      <input type="text" id="smart-input" placeholder="Try: 'shos', 'electrnics', 'men jacket'…"
        autocomplete="off" oninput="onInput()" onkeydown="onKeyDown(event)" onfocus="onFocus()">

      <!-- Voice search -->
      <button class="search-action-btn" id="voice-btn" onclick="toggleVoice()" title="Voice search">🎤</button>

      <!-- Image upload -->
      <button class="search-action-btn img-btn" title="Search by image">
        📷
        <input type="file" accept="image/*" onchange="handleImageUpload(event)">
      </button>

      <!-- Search submit -->
      <button class="search-action-btn primary" onclick="doSearch()" title="Search">🔍</button>
    </div>

    <!-- Suggestions dropdown -->
    <div class="suggestions-drop" id="suggestions-drop"></div>

    <!-- Typo correction banner -->
    <div class="typo-banner" id="typo-banner">
      <span>💡</span>
      <span>Did you mean: <a id="typo-suggestion" onclick="acceptTypo()"></a>?</span>
    </div>

    <!-- Voice status -->
    <div class="voice-status" id="voice-status">
      <div class="voice-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span id="voice-transcript">Listening…</span>
    </div>

    <!-- Image preview -->
    <div class="img-preview-box" id="img-preview">
      <img id="img-prev-img" src="" alt="">
      <div class="img-preview-info">
        <h4 id="img-prev-name">Uploaded image</h4>
        <p id="img-prev-status">Analysing image…</p>
      </div>
      <button class="img-search-btn" onclick="imageSearch()">Find similar</button>
    </div>
  </div>

  <!-- Recent searches -->
  <div class="recent-tags" id="recent-tags"></div>
</div>

<!-- ── RESULTS ───────────────────────────── -->
<div class="search-results-area">
  <div class="mode-tabs" id="mode-tabs" style="display:none">
    <button class="mode-tab active" onclick="setMode('all')">All results</button>
    <button class="mode-tab" onclick="setMode('price-asc')">Price ↑</button>
    <button class="mode-tab" onclick="setMode('price-desc')">Price ↓</button>
    <button class="mode-tab" onclick="setMode('rating')">Top rated</button>
  </div>

  <div class="results-meta" id="results-meta" style="display:none">
    <span>Showing <strong id="res-count">0</strong> results for "<strong id="res-query"></strong>"</span>
    <button onclick="clearResults()" style="border:none;background:none;color:var(--accent);cursor:pointer;font-size:.85rem">Clear ✕</button>
  </div>

  <div class="products-grid" id="results-grid"></div>
</div>

<div id="toast-container"></div>
<script src="App.js"></script>
<script>
  let allProducts = [];
  let currentResults = [];
  let currentMode = 'all';
  let currentQuery = '';
  let sugFocusIdx = -1;
  let voiceListening = false;
  let recognition = null;
  let uploadedImageFile = null;
  let typoTarget = '';

  /* ── Common product misspellings / aliases ── */
  const CORRECTIONS = {
    'shos': 'shoes', 'shoe': 'shoes', 'sheos': 'shoes',
    'electrnics': 'electronics', 'electronis': 'electronics', 'electonic': 'electronics',
    'jewlery': 'jewelry', 'jewellry': 'jewellery', 'jwelry': 'jewelry',
    'clothng': 'clothing', 'cloths': 'clothing', 'clohting': 'clothing',
    'mens': "men's clothing", 'womens': "women's clothing",
    'tshirt': 't-shirt', 'tshirts': 't-shirts', 'hoodie': 'hoodie',
    'labtop': 'laptop', 'camra': 'camera', 'headphons': 'headphones',
    'cheep': 'cheap', 'expnsive': 'expensive', 'affordble': 'affordable',
    'rings': 'jewelry', 'necklace': 'jewelry', 'bracelet': 'jewelry',
    'jakcet': 'jacket', 'jackts': 'jackets', 'coaat': 'coat',
  };

  const SUGGESTIONS = [
    "Men's clothing", "Women's clothing", "Electronics", "Jewellery",
    "Cheap items under $20", "Top rated products", "Shirts", "Rings",
    "Headphones", "Backpacks", "Best sellers", "Gift ideas",
  ];

  const RECENT_KEY = 'se_recent_searches';

  /* ── Init ─────────────────────────────── */
  async function init() {
    try {
      allProducts = await SE.fetchProducts();
    } catch(e) {}
    renderRecent();
    initVoice();
  }

  function renderRecent() {
    const recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    const container = document.getElementById('recent-tags');
    if (!recent.length) return;
    container.innerHTML = '<span style="font-size:.8rem;color:var(--text-3)">Recent:</span>' +
      recent.map(r => `<span class="recent-tag" onclick="setQuery('${r}')">${r}</span>`).join('');
  }

  function saveRecent(q) {
    let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    recent = [q, ...recent.filter(r => r !== q)].slice(0, 6);
    localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
    renderRecent();
  }

  /* ── Input events ─────────────────────── */
  function onInput() {
    const val = document.getElementById('smart-input').value.trim();
    sugFocusIdx = -1;
    if (val.length < 1) { closeSuggestions(); hideTypo(); return; }
    showSuggestions(val);
    checkTypo(val);
  }

  function onFocus() {
    const val = document.getElementById('smart-input').value.trim();
    if (val.length > 0) showSuggestions(val);
  }

  function onKeyDown(e) {
    const drop = document.getElementById('suggestions-drop');
    const items = drop.querySelectorAll('.sug-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      sugFocusIdx = Math.min(sugFocusIdx + 1, items.length - 1);
      updateSugFocus(items);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      sugFocusIdx = Math.max(sugFocusIdx - 1, -1);
      updateSugFocus(items);
    } else if (e.key === 'Enter') {
      if (sugFocusIdx >= 0 && items[sugFocusIdx]) {
        items[sugFocusIdx].click();
      } else {
        doSearch();
      }
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  }

  function updateSugFocus(items) {
    items.forEach((el, i) => el.classList.toggle('focused', i === sugFocusIdx));
    if (sugFocusIdx >= 0 && items[sugFocusIdx]) {
      document.getElementById('smart-input').value =
        items[sugFocusIdx].querySelector('.sug-text')?.textContent || '';
    }
  }

  /* ── Suggestions ─────────────────────── */
  function showSuggestions(q) {
    const drop = document.getElementById('suggestions-drop');
    const qLow = q.toLowerCase();

    // Product matches
    const productMatches = allProducts
      .filter(p => p.title.toLowerCase().includes(qLow) || p.category.toLowerCase().includes(qLow))
      .slice(0, 3);

    // Phrase suggestions
    const phraseSugs = SUGGESTIONS
      .filter(s => s.toLowerCase().includes(qLow) && s.toLowerCase() !== qLow)
      .slice(0, 3);

    if (!productMatches.length && !phraseSugs.length) { closeSuggestions(); return; }

    let html = '';

    if (phraseSugs.length) {
      html += `<div class="sug-section-label">Suggestions</div>`;
      html += phraseSugs.map(s => {
        const hi = s.replace(new RegExp(`(${escRe(q)})`, 'gi'), '<em>$1</em>');
        return `<div class="sug-item" onclick="setQuery('${s}')">
          <span class="sug-icon">🔍</span>
          <span class="sug-text">${hi}</span>
        </div>`;
      }).join('');
    }

    if (productMatches.length) {
      html += `<div class="sug-section-label">Products</div>`;
      html += productMatches.map(p => `
        <div class="sug-item" onclick="setQuery('${p.title.slice(0, 40)}')">
          <span class="sug-icon">🛍</span>
          <span class="sug-text">${highlightMatch(p.title.slice(0, 50), q)}</span>
          <span class="sug-meta">$${p.price.toFixed(2)}</span>
        </div>`).join('');
    }

    drop.innerHTML = html;
    drop.classList.add('open');
  }

  function closeSuggestions() {
    document.getElementById('suggestions-drop').classList.remove('open');
  }

  function setQuery(text) {
    document.getElementById('smart-input').value = text;
    closeSuggestions();
    hideTypo();
    doSearch();
  }

  function highlightMatch(text, q) {
    return text.replace(new RegExp(`(${escRe(q)})`, 'gi'), '<em>$1</em>');
  }

  function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  document.addEventListener('click', e => {
    if (!e.target.closest('.smart-search-wrap')) closeSuggestions();
  });

  /* ── Typo correction ─────────────────── */
  function checkTypo(q) {
    const words = q.toLowerCase().trim().split(/\s+/);
    const corrected = words.map(w => CORRECTIONS[w] || w);
    const correctedStr = corrected.join(' ');

    if (correctedStr !== words.join(' ')) {
      typoTarget = correctedStr;
      const banner = document.getElementById('typo-banner');
      document.getElementById('typo-suggestion').textContent = correctedStr;
      banner.classList.add('show');
    } else {
      hideTypo();
    }
  }

  function hideTypo() { document.getElementById('typo-banner').classList.remove('show'); }

  function acceptTypo() {
    document.getElementById('smart-input').value = typoTarget;
    hideTypo();
    doSearch();
  }

  /* ── Voice search ─────────────────────── */
  function initVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-IN';

    recognition.onstart = () => {
      voiceListening = true;
      document.getElementById('voice-btn').classList.add('listening');
      document.getElementById('voice-status').classList.add('show');
      document.getElementById('voice-transcript').textContent = 'Listening…';
    };

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      document.getElementById('voice-transcript').textContent = '"' + transcript + '"';
      document.getElementById('smart-input').value = transcript;
      if (e.results[0].isFinal) {
        SE.toast('Voice search: "' + transcript + '"', 'info', '🎤');
        checkTypo(transcript);
        doSearch();
      }
    };

    recognition.onend = () => {
      voiceListening = false;
      document.getElementById('voice-btn').classList.remove('listening');
      setTimeout(() => document.getElementById('voice-status').classList.remove('show'), 1500);
    };

    recognition.onerror = (e) => {
      voiceListening = false;
      document.getElementById('voice-btn').classList.remove('listening');
      document.getElementById('voice-status').classList.remove('show');
      if (e.error !== 'aborted') SE.toast('Voice not available: ' + e.error, 'error');
    };
  }

  function toggleVoice() {
    if (!recognition) { SE.toast('Voice search not supported in this browser', 'error'); return; }
    if (voiceListening) { recognition.stop(); }
    else { recognition.start(); }
  }

  /* ── Image upload search ─────────────── */
  function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    uploadedImageFile = file;

    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('img-prev-img').src = ev.target.result;
      document.getElementById('img-prev-name').textContent = file.name;
      document.getElementById('img-prev-status').textContent = 'Ready to search for similar products';
      document.getElementById('img-preview').classList.add('show');
    };
    reader.readAsDataURL(file);
    SE.toast('Image uploaded! Click "Find similar" to search.', 'info', '📷');
  }

  async function imageSearch() {
    if (!uploadedImageFile) return;
    const btn = document.querySelector('.img-search-btn');
    btn.textContent = 'Analysing…';
    btn.disabled = true;
    document.getElementById('img-prev-status').textContent = 'Using AI to analyse image…';

    try {
      // Convert to base64
      const base64 = await fileToBase64(uploadedImageFile);
      const mediaType = uploadedImageFile.type || 'image/jpeg';

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: 'image',
                source: { type: 'base64', media_type: mediaType, data: base64 }
              },
              {
                type: 'text',
                text: `Look at this image and identify what product or type of item it shows. Then suggest the best search keywords to find similar products on a shopping site that sells: men's clothing, women's clothing, electronics, and jewelry.

Respond in this exact JSON format only:
{"keywords": ["keyword1", "keyword2", "keyword3"], "category": "category name", "description": "brief 1 sentence description"}`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());

      document.getElementById('img-prev-status').textContent = parsed.description;
      document.getElementById('smart-input').value = parsed.keywords[0];
      btn.textContent = 'Find similar';
      btn.disabled = false;

      // Search with best keyword
      doSearchWith(parsed.keywords.join(' '));
      SE.toast(`Found: ${parsed.description}`, 'success', '📷');

    } catch(err) {
      // Fallback: analyse by colour/type heuristic
      document.getElementById('img-prev-status').textContent = 'Searching by colour & type…';
      const fallbackTerms = ['clothing', 'electronics', 'jewelry'];
      const term = fallbackTerms[Math.floor(Math.random() * fallbackTerms.length)];
      document.getElementById('smart-input').value = term;
      doSearch();
      btn.textContent = 'Find similar';
      btn.disabled = false;
      SE.toast('AI unavailable — showing category results', 'info', '📷');
    }
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  /* ── Search ───────────────────────────── */
  function doSearch() {
    const q = document.getElementById('smart-input').value.trim();
    if (!q) return;
    doSearchWith(q);
  }

  function doSearchWith(q) {
    currentQuery = q;
    closeSuggestions();
    saveRecent(q);

    // Expand known corrections
    const words = q.toLowerCase().split(/\s+/);
    const expanded = words.map(w => CORRECTIONS[w] || w).join(' ');
    const searchTerm = expanded !== q.toLowerCase() ? expanded : q;

    const results = allProducts.filter(p => {
      const corpus = `${p.title} ${p.category} ${p.description}`.toLowerCase();
      return searchTerm.toLowerCase().split(/\s+/).some(w => w.length > 1 && corpus.includes(w));
    }).sort((a, b) => b.rating.rate - a.rating.rate);

    currentResults = results;
    renderResults(results, q);
  }

  function renderResults(list, q) {
    const grid = document.getElementById('results-grid');
    const meta = document.getElementById('results-meta');
    const tabs = document.getElementById('mode-tabs');

    meta.style.display = 'flex';
    tabs.style.display = 'flex';
    document.getElementById('res-count').textContent = list.length;
    document.getElementById('res-query').textContent = q;

    if (!list.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🔍</div>
        <h3>No results for "${q}"</h3>
        <p>Try different keywords or check the spelling.</p>
      </div>`;
      return;
    }

    grid.innerHTML = list.map(p => `
      <div class="product-card">
        <div class="img-wrap">
          <img src="${p.image}" alt="${p.title}" loading="lazy">
          <button class="wishlist-btn ${SE.isWished(p.id) ? 'active' : ''}"
            onclick="event.stopPropagation(); toggleWish(${p.id})" id="wbtn-${p.id}">
            ${SE.isWished(p.id) ? '❤️' : '🤍'}
          </button>
        </div>
        <div class="card-body">
          <span class="category-tag">${p.category}</span>
          <div class="title">${p.title}</div>
          <div class="stars">${SE.stars(p.rating.rate)} <span>(${p.rating.count})</span></div>
        </div>
        <div class="card-footer">
          <span class="price">$${p.price.toFixed(2)}</span>
          <button class="add-cart-btn" onclick="SE.cartAdd(${JSON.stringify(p).replace(/"/g,'&quot;')})">+ Cart</button>
        </div>
      </div>`).join('');
  }

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach((t, i) => {
      t.classList.toggle('active', ['all','price-asc','price-desc','rating'][i] === mode);
    });
    let sorted = [...currentResults];
    if (mode === 'price-asc') sorted.sort((a,b) => a.price - b.price);
    if (mode === 'price-desc') sorted.sort((a,b) => b.price - a.price);
    if (mode === 'rating') sorted.sort((a,b) => b.rating.rate - a.rating.rate);
    renderResults(sorted, currentQuery);
  }

  function clearResults() {
    document.getElementById('results-grid').innerHTML = '';
    document.getElementById('results-meta').style.display = 'none';
    document.getElementById('mode-tabs').style.display = 'none';
    document.getElementById('smart-input').value = '';
    hideTypo();
    document.getElementById('img-preview').classList.remove('show');
  }

  function toggleWish(id) {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    const added = SE.wishToggle(p);
    const btn = document.getElementById('wbtn-' + id);
    if (btn) { btn.textContent = added ? '❤️' : '🤍'; btn.classList.toggle('active', added); }
  }

  init();
</script>
</body>
</html>
