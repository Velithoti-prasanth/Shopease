<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: url(images/login-1.jpg);
    background-size: cover;
    background-position: center;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}


.card {
    background: transparent;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: white;
}


.form-control {
    border-radius: 10px;
    padding: 10px;
}


.btn-primary {
    width: 100%;
    border-radius: 10px;
}


@media (max-width: 576px) {
    .card {
        margin: 15px;
    }
}
</style>

</head>

<body>

<div class="container">
<div class="row justify-content-center">
<div class="col-lg-4 col-md-6 col-12">

<div class="card p-4">

<h3 class="text-center">Create Account 📝</h3>
<p class="text-center text-black ">Register to continue</p>

<form onsubmit="handleRegister(event)">

<input type="text" id="username" class="form-control mb-3" placeholder="Enter username" required>

<input type="email" id="email" class="form-control mb-3" placeholder="Enter email" required>

<div class="input-group mb-3">
    <input type="password" id="password" class="form-control" placeholder="Enter password" required> 
</div>

<div class="input-group mb-3">
    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
</div>

<button class="btn btn-primary text-white">Register</button>

<p class="text-center mt-3">
Already have an account? 
<a href="login.html" class="text-white fw-bold">Login</a>
</p>

<div id="msg" class="text-center mt-2"></div>

</form>

</div>
</div>
</div>
</div>

<script>
function handleRegister(e) {
    e.preventDefault();

    let username = document.getElementById("username").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let confirmPassword = document.getElementById("confirmPassword").value.trim();
    let msg = document.getElementById("msg");

    msg.textContent = "";

    
    if (password !== confirmPassword) {
        msg.textContent = "Passwords do not match!";
        msg.className = "text-danger text-center";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    
    let exists = users.find(u => u.email === email);

    if (exists) {
        msg.textContent = "User already exists!";
        msg.className = "text-warning text-center";
        return;
    }

  
    users.push({ username, email, password });
    localStorage.setItem("users", JSON.stringify(users));

    msg.textContent = "Registered successfully! Redirecting...";
    msg.className = "text-success text-center";

   
    setTimeout(() => {
        window.location.href = "login.html";
    }, 1500);
}


function togglePassword(id) {
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
